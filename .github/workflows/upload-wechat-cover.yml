name: Upload WeChat Cover

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Upload cover image as permanent WeChat material
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${WECHAT_APP_ID:-}" ] || [ -z "${WECHAT_APP_SECRET:-}" ]; then
            echo "WECHAT_APP_ID and WECHAT_APP_SECRET secrets are required." >&2
            exit 1
          fi

          token_response=$(curl -sS --get "https://api.weixin.qq.com/cgi-bin/token" \
            --data-urlencode "grant_type=client_credential" \
            --data-urlencode "appid=${WECHAT_APP_ID}" \
            --data-urlencode "secret=${WECHAT_APP_SECRET}")

          access_token=$(TOKEN_RESPONSE="$token_response" python -c 'import json, os, sys; data=json.loads(os.environ["TOKEN_RESPONSE"]); token=data.get("access_token"); print(token) if token else sys.exit(f"Could not get access_token: {data}")')

          upload_response=$(curl -sS \
            -F "media=@assets/wechat-cover.jpg" \
            "https://api.weixin.qq.com/cgi-bin/material/add_material?access_token=${access_token}&type=image")

          media_id=$(UPLOAD_RESPONSE="$upload_response" python -c 'import json, os, sys; data=json.loads(os.environ["UPLOAD_RESPONSE"]); media_id=data.get("media_id"); print(media_id) if media_id else sys.exit(f"WeChat upload failed: {data}")')

          echo ""
          echo "Copy this value into GitHub Actions secret WECHAT_THUMB_MEDIA_ID:"
          echo "$media_id"
          echo ""
