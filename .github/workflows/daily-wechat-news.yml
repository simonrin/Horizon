name: Daily Email News

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-wechat-news.yml"
      - "scripts/send_email_summary.py"
      - "data/config.wechat-news.example.json"
  schedule:
    # 08:23 Asia/Shanghai every day. Avoid GitHub's busy top-of-hour scheduler window.
    - cron: "23 0 * * *"
    # 12:23 Asia/Shanghai backup. It skips automatically if today's scheduled email already succeeded.
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-email-news
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      RSSHUB_BASE: ${{ vars.RSSHUB_BASE || 'https://rsshub.app' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      MAIL_TO: u8044657@anu.edu.au
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
      SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
      SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}

    steps:
      - name: Skip backup if today's scheduled email already succeeded
        id: dedupe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, time, timezone
          from zoneinfo import ZoneInfo

          if os.getenv("GITHUB_EVENT_NAME") != "schedule":
              print("skip=false")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write("skip=false\n")
              raise SystemExit(0)

          repo = os.environ["GITHUB_REPOSITORY"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          token = os.environ["GH_TOKEN"]

          local_tz = ZoneInfo("Asia/Shanghai")
          today = datetime.now(local_tz).date()
          start_local = datetime.combine(today, time.min, tzinfo=local_tz)
          start_utc = start_local.astimezone(timezone.utc)

          query = urllib.parse.urlencode({
              "event": "schedule",
              "status": "success",
              "per_page": "30",
              "created": f">={start_utc.isoformat().replace('+00:00', 'Z')}",
          })
          url = f"https://api.github.com/repos/{repo}/actions/workflows/daily-wechat-news.yml/runs?{query}"
          request = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "horizon-daily-email",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              payload = json.load(response)

          previous_success = [
              run for run in payload.get("workflow_runs", [])
              if int(run.get("id", 0)) != current_run_id
          ]
          skip = bool(previous_success)
          print(f"skip={str(skip).lower()}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"skip={str(skip).lower()}\n")
          PY

      - name: Checkout code
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        if: steps.dedupe.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.dedupe.outputs.skip != 'true'
        run: uv sync

      - name: Use email news config
        if: steps.dedupe.outputs.skip != 'true'
        run: cp data/config.wechat-news.example.json data/config.json

      - name: Generate 28-item daily news summary
        if: steps.dedupe.outputs.skip != 'true'
        run: uv run horizon --hours 24

      - name: Deploy GitHub Pages
        if: steps.dedupe.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Send daily summary email
        if: steps.dedupe.outputs.skip != 'true'
        run: uv run python scripts/send_email_summary.py --lang zh

      - name: Upload generated summaries
        if: always() && steps.dedupe.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: horizon-summaries
          path: |
            data/summaries/*.md
            docs/_posts/*.md
          if-no-files-found: ignore
