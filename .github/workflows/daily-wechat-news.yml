name: Daily Email News

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-wechat-news.yml"
      - "scripts/send_email_summary.py"
      - "data/config.wechat-news.example.json"
  schedule:
    # 08:00 Asia/Shanghai every day.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-email-news
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      RSSHUB_BASE: ${{ vars.RSSHUB_BASE || 'https://rsshub.app' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      MAIL_TO: u8044657@anu.edu.au
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
      SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
      SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Use email news config
        run: cp data/config.wechat-news.example.json data/config.json

      - name: Generate 28-item daily news summary
        run: uv run horizon --hours 24

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Send daily summary email
        run: uv run python scripts/send_email_summary.py --lang zh

      - name: Upload generated summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-summaries
          path: |
            data/summaries/*.md
            docs/_posts/*.md
          if-no-files-found: ignore
