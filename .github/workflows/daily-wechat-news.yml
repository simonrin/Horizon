name: Daily WeChat News

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/daily-wechat-news.yml"
  schedule:
    # 08:00 Asia/Shanghai every day.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-wechat-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
      WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
      WECHAT_THUMB_MEDIA_ID: ${{ secrets.WECHAT_THUMB_MEDIA_ID }}
      WECHAT_AUTHOR: ${{ vars.WECHAT_AUTHOR || 'Horizon' }}
      WECHAT_CONTENT_SOURCE_URL: ${{ vars.WECHAT_CONTENT_SOURCE_URL || '' }}
      WECHAT_DIGEST: ${{ vars.WECHAT_DIGEST || '' }}
      WECHAT_LANG: zh
      WECHAT_PUBLISH_MODE: ${{ vars.WECHAT_PUBLISH_MODE || 'draft' }}
      RSSHUB_BASE: ${{ vars.RSSHUB_BASE || 'https://rsshub.app' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Use WeChat news config
        run: cp data/config.wechat-news.example.json data/config.json

      - name: Generate 36-item daily news summary
        run: uv run horizon --hours 24

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          publish_branch: gh-pages
          enable_jekyll: true

      - name: Publish to WeChat Official Account
        run: uv run python scripts/publish_wechat.py --lang zh

      - name: Upload generated summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-summaries
          path: |
            data/summaries/*.md
            docs/_posts/*.md
          if-no-files-found: ignore

